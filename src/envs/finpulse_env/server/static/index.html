<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPulse - AI Wealth Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric {
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .metric-label {
            font-size: 0.85em;
            color: #718096;
            margin-bottom: 5px;
        }
        .metric-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #2d3748;
        }
        .action-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }
        .slider-group {
            margin-bottom: 15px;
        }
        .slider-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e2e8f0;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }
        .slider-value {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: 600;
            margin-left: 10px;
        }
        .intervention-alert {
            background: #fed7d7;
            border-left: 4px solid #f56565;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            color: #742a2a;
            font-weight: 500;
        }
        .success-alert {
            background: #c6f6d5;
            border-left: 4px solid #48bb78;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            color: #22543d;
            font-weight: 500;
        }
        .positions-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }
        .positions-table th,
        .positions-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .positions-table th {
            background: #f7fafc;
            font-weight: 600;
            color: #4a5568;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-buy { background: #c6f6d5; color: #22543d; }
        .badge-sell { background: #fed7d7; color: #742a2a; }
        .badge-hold { background: #e2e8f0; color: #4a5568; }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online { background: #48bb78; }
        .status-offline { background: #f56565; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🫀 FinPulse</h1>
            <p>AI Wealth Manager with Emotional Intelligence</p>
            <p style="font-size: 0.9em; margin-top: 10px;">
                <span class="status-indicator status-online" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </p>
        </div>

        <div class="card">
            <h2>📊 Portfolio Overview</h2>
            <div class="grid">
                <div class="metric">
                    <div class="metric-label">Portfolio Value</div>
                    <div class="metric-value" id="portfolioValue">$10,000.00</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Cash Balance</div>
                    <div class="metric-value" id="cashBalance">$10,000.00</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Total Return</div>
                    <div class="metric-value" id="totalReturn">0.00%</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Episode Step</div>
                    <div class="metric-value" id="stepCount">0</div>
                </div>
            </div>

            <h3 style="margin-top: 20px; margin-bottom: 10px; color: #4a5568;">Current Prices</h3>
            <table class="positions-table">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Price</th>
                        <th>Your Shares</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody id="pricesTable">
                    <tr><td colspan="4" style="text-align: center; color: #a0aec0;">Reset to load data</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>😰 Your Emotional State</h2>
            <div class="slider-group">
                <label>
                    Stress Level
                    <span class="slider-value" id="stressValue">5</span>
                </label>
                <input type="range" id="stressSlider" min="1" max="10" value="5">
            </div>
            <div class="slider-group">
                <label>
                    Confidence Level
                    <span class="slider-value" id="confidenceValue">5</span>
                </label>
                <input type="range" id="confidenceSlider" min="1" max="10" value="5">
            </div>
        </div>

        <div class="card">
            <h2>💼 Trading Actions</h2>
            <div class="action-panel">
                <button onclick="trade('buy', 'AAPL')">📈 Buy AAPL</button>
                <button onclick="trade('buy', 'MSFT')">📈 Buy MSFT</button>
                <button onclick="trade('buy', 'GOOGL')">📈 Buy GOOGL</button>
            </div>
            <div class="action-panel" style="margin-top: 10px;">
                <button onclick="trade('sell', 'AAPL')" style="background: #f56565;">📉 Sell AAPL</button>
                <button onclick="trade('sell', 'MSFT')" style="background: #f56565;">📉 Sell MSFT</button>
                <button onclick="trade('sell', 'GOOGL')" style="background: #f56565;">📉 Sell GOOGL</button>
            </div>
            <div class="action-panel" style="margin-top: 10px;">
                <button onclick="trade('hold')" style="background: #718096;">⏸️ Hold Position</button>
                <button onclick="resetEnv()" style="background: #ed8936;">🔄 Reset Episode</button>
            </div>
            <div id="alertBox"></div>
        </div>
    </div>

    <script>
        let currentPrices = {};
        let initialBalance = 10000;

        // Update slider displays
        document.getElementById('stressSlider').addEventListener('input', (e) => {
            document.getElementById('stressValue').textContent = e.target.value;
        });
        document.getElementById('confidenceSlider').addEventListener('input', (e) => {
            document.getElementById('confidenceValue').textContent = e.target.value;
        });

        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                if (data.status === 'healthy') {
                    document.getElementById('statusDot').className = 'status-indicator status-online';
                    document.getElementById('statusText').textContent = 'Server Online';
                    return true;
                }
            } catch (error) {
                document.getElementById('statusDot').className = 'status-indicator status-offline';
                document.getElementById('statusText').textContent = 'Server Offline';
                return false;
            }
        }

        async function resetEnv() {
            const response = await fetch('/reset', { method: 'POST' });
            const obs = await response.json();
            updateUI(obs, 'Environment reset! Ready to trade.');
        }

        async function trade(actionType, symbol = 'AAPL') {
            const stress = parseInt(document.getElementById('stressSlider').value);
            const confidence = parseInt(document.getElementById('confidenceSlider').value);

            const action = {
                action_type: actionType,
                symbol: symbol,
                amount_pct: 0.3,
                user_stress: stress,
                user_confidence: confidence
            };

            const response = await fetch('/step', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(action)
            });
            const obs = await response.json();

            if (obs.intervention) {
                showAlert(obs.intervention_reason, 'intervention');
            } else {
                const actionText = actionType === 'hold' ? 'Held position' : `${actionType.toUpperCase()} ${symbol}`;
                showAlert(`✅ ${actionText} | Reward: +${obs.reward.toFixed(2)}`, 'success');
            }

            updateUI(obs);
        }

        function updateUI(obs, message = null) {
            // Update metrics
            document.getElementById('portfolioValue').textContent =
                '$' + obs.portfolio_value.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('cashBalance').textContent =
                '$' + obs.cash_balance.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('stepCount').textContent = obs.metadata.step;

            const returnPct = ((obs.portfolio_value - initialBalance) / initialBalance * 100).toFixed(2);
            document.getElementById('totalReturn').textContent = returnPct + '%';
            document.getElementById('totalReturn').style.color = returnPct >= 0 ? '#48bb78' : '#f56565';

            // Update prices table
            currentPrices = obs.prices;
            const tbody = document.getElementById('pricesTable');
            tbody.innerHTML = '';

            Object.entries(obs.prices).forEach(([symbol, price]) => {
                const shares = obs.positions[symbol] || 0;
                const value = shares * price;

                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${symbol}</strong></td>
                    <td>$${price.toFixed(2)}</td>
                    <td>${shares}</td>
                    <td>$${value.toFixed(2)}</td>
                `;
            });

            if (message) {
                showAlert(message, 'success');
            }
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            const alertClass = type === 'intervention' ? 'intervention-alert' : 'success-alert';
            alertBox.innerHTML = `<div class="${alertClass}">${message}</div>`;

            setTimeout(() => {
                alertBox.innerHTML = '';
            }, 5000);
        }

        // Initialize
        checkHealth().then(healthy => {
            if (healthy) {
                resetEnv();
            }
        });
    </script>
</body>
</html>
